{% extends 'base.html' %}

{% block title %}Clients - CRM{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
        <h2>Clients</h2>
        <div style="display: flex; gap: 10px; align-items: center;">
            <input type="text"
                   id="client-search"
                   name="search"
                   placeholder="Search clients..."
                   class="form-control"
                   style="width: 250px;"
                   value="{{ search_query }}"
                   hx-get="{% url 'client_search' %}"
                   hx-trigger="keyup changed delay:300ms"
                   hx-target="#client-table-body"
                   hx-swap="innerHTML">
            <a href="{% url 'client_create' %}" class="btn btn-success">+ Add Client</a>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Created</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="client-table-body">
            {% include 'clients/partials/client_list_body.html' %}
        </tbody>
    </table>
</div>
{% endblock %}
