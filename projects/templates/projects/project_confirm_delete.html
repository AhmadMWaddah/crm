{% extends 'base.html' %}

{% block title %}Delete Project - CRM{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>Delete Project</h2>
    </div>
    
    <div style="padding: 20px 0;">
        <p>Are you sure you want to delete the project "<strong>{{ object.name }}</strong>"?</p>
        <p class="text-muted" style="margin-top: 10px;">This action cannot be undone.</p>
    </div>
    
    <form method="post">
        {% csrf_token %}
        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'project_list' %}" class="btn btn-secondary" style="background-color: #6c757d; color: white;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
